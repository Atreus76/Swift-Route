spring.application.name=swiftroute

spring.datasource.url = jdbc:postgresql://localhost:5432/swiftroute
spring.datasource.username = swiftroute
spring.datasource.password = swiftroute
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.swiftroute.order.domain.model,com.example.swiftroute.dispatch.domain.model
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler
# logging.level.com.example.swiftroute.order.infrastructure.persistence.OrderMapper=TRACE
mybatis.type-handlers-package=com.example.swiftroute.shared.infrastructure.persistence